<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador de Campaña | Dominio Visual</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f4f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 440px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.07);
    }

    .header { margin-bottom: 2rem; }

    .header p {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 4px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .campo { margin-bottom: 1.6rem; }

    .campo label.titulo-campo {
      display: block;
      font-size: 13px;
      color: #777;
      margin-bottom: 10px;
      font-weight: 500;
    }

    .campo-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* Estilos para las ubicaciones */
    .ubicaciones-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .ubi-chip {
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .ubi-chip input {
      display: none;
    }

    .ubi-chip span {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-radius: 12px;
      border: 1.5px solid #efefef;
      background: #fdfdfd;
      font-size: 14px;
      font-weight: 500;
      color: #444;
      transition: all 0.2s ease;
    }

    .ubi-chip span small {
      font-size: 11px;
      color: #999;
      background: #eee;
      padding: 2px 6px;
      border-radius: 6px;
    }

    .ubi-chip input:checked + span {
      background: #1a1a1a;
      color: #fff;
      border-color: #1a1a1a;
    }

    .ubi-chip input:checked + span small {
      background: #333;
      color: #ddd;
    }

    /* Estilos para los contadores */
    .btn-step {
      width: 44px;
      height: 48px;
      border: none;
      background: #f5f4f0;
      border-radius: 12px;
      font-size: 22px;
      color: #444;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
      line-height: 1;
    }

    .btn-step:hover { background: #e8e7e3; }
    .btn-step:active { transform: scale(0.94); }

    .num-input {
      flex: 1;
      height: 48px;
      font-size: 22px;
      font-weight: 600;
      color: #1a1a1a;
      text-align: center;
      border: 1.5px solid #efefef;
      border-radius: 12px;
      background: #fff;
      padding: 0 8px;
      min-width: 0;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }

    .num-input::-webkit-outer-spin-button,
    .num-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .num-input:focus { outline: none; border-color: #bbb; }

    .divider {
      border: none;
      border-top: 1px solid #efefef;
      margin: 1.8rem 0;
    }

    .total-card {
      background: #1a1a1a;
      border-radius: 14px;
      padding: 1.8rem 1.5rem;
    }

    .total-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 8px;
    }

    .total-valor {
      font-size: 40px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 12px;
    }

    .total-detalle {
      font-size: 12px;
      color: #888;
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }

    .btn-cta {
      display: block;
      width: 100%;
      background: #fff;
      color: #1a1a1a;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-cta:hover { background: #eee; }
    .btn-cta:active { transform: scale(0.98); }
    .btn-cta:disabled { background: #555; color: #888; cursor: not-allowed; }

    @media (max-width: 440px) {
      .card { padding: 2rem 1.25rem; }
      .total-valor { font-size: 34px; }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="header">
      <p>Simulador Web</p>
      <h1>Presupuestá tu pauta</h1>
    </div>

    <div class="campo">
      <label class="titulo-campo">Seleccioná los puntos de exhibición</label>
      <div class="ubicaciones-grid" id="contenedor-ubicaciones">
        <label class="ubi-chip">
          <input type="checkbox" value="1" data-name="El Punto San Lorenzo Chico - 1" onchange="calcular()" checked>
          <span>El Punto San Lorenzo Chico - 1</span>
        </label>
        
        <label class="ubi-chip">
          <input type="checkbox" value="1" data-name="El Punto San Lorenzo Chico - 2" onchange="calcular()">
          <span>El Punto San Lorenzo Chico - 2</span>
        </label>
        
        <label class="ubi-chip">
          <input type="checkbox" value="1" data-name="Galería La Continental" onchange="calcular()" checked>
          <span>Galería La Continental</span>
        </label>
        
        <label class="ubi-chip">
          <input type="checkbox" value="1" data-name="Galería El Palacio - 1" onchange="calcular()">
          <span>Galería El Palacio - 1</span>
        </label>
        
        <label class="ubi-chip">
          <input type="checkbox" value="1" data-name="Galería El Palacio - 2" onchange="calcular()">
          <span>Galería El Palacio - 2</span>
        </label>
        
        <label class="ubi-chip">
          <input type="checkbox" value="1" data-name="Galería Buenos Aires" onchange="calcular()">
          <span>Galería Buenos Aires</span>
        </label>

        <label class="ubi-chip">
          <input type="checkbox" value="1" data-name="Universidad Católica de Salta" onchange="calcular()">
          <span>Universidad Católica de Salta</span>
        </label>

        <label class="ubi-chip">
          <input type="checkbox" value="0.5" data-name="Galería Margalef (1 Pantalla)" onchange="calcular()">
          <span>Galería Margalef <small>1 Pantalla</small></span>
        </label>
      </div>
    </div>

    <div class="campo">
      <label class="titulo-campo">Pases por día (15 seg. c/u)</label>
      <div class="campo-row">
        <button class="btn-step" type="button" onclick="cambiar('pases', -50)">-</button>
        <input class="num-input" type="number" id="val-pases" value="200" min="50" step="50" oninput="calcular()" onblur="validar('pases')">
        <button class="btn-step" type="button" onclick="cambiar('pases', 50)">+</button>
      </div>
    </div>

    <div class="campo">
      <label class="titulo-campo">Días de pauta contratados</label>
      <div class="campo-row">
        <button class="btn-step" type="button" onclick="cambiar('dias', -1)">-</button>
        <input class="num-input" type="number" id="val-dias" value="1" min="1" oninput="calcular()" onblur="validar('dias')">
        <button class="btn-step" type="button" onclick="cambiar('dias', 1)">+</button>
      </div>
    </div>

    <hr class="divider">

    <div class="total-card">
      <div class="total-label">Inversión estimada</div>
      <div class="total-valor" id="res-total">$ 0</div>
      <div class="total-detalle" id="res-detalle">Cargando estimación...</div>
      <button class="btn-cta" id="btn-whatsapp" type="button" onclick="enviarWhatsApp()">Reservar estas ubicaciones</button>
    </div>
  </div>

  <script>
    function get(campo) {
      var input = document.getElementById('val-' + campo);
      if(!input) return 1;
      var v = parseInt(input.value, 10);
      var min = parseInt(input.getAttribute('min'), 10) || 1;
      return (isNaN(v) || v < min) ? min : v;
    }

    function cambiar(campo, delta) {
      var input = document.getElementById('val-' + campo);
      if(!input) return;
      var nuevoValor = get(campo) + delta;
      var min = parseInt(input.getAttribute('min'), 10) || 1;
      if (nuevoValor < min) nuevoValor = min;
      input.value = nuevoValor;
      calcular();
    }

    function validar(campo) {
      var input = document.getElementById('val-' + campo);
      if(!input) return;
      var min = parseInt(input.getAttribute('min'), 10) || 1;
      var v = parseInt(input.value, 10);
      if (isNaN(v) || v < min) v = min;
      input.value = v;
      calcular();
    }

    function calcular() {
      var pases = get('pases');
      var dias = get('dias');
      
      var checkboxes = document.querySelectorAll('.ubi-chip input:checked');
      var btnWhatsapp = document.getElementById('btn-whatsapp');
      
      var totemsEquivalentes = 0;
      var locacionesCount = checkboxes.length;

      checkboxes.forEach(function(cb) {
        totemsEquivalentes += parseFloat(cb.value);
      });

      if (locacionesCount === 0) {
        document.getElementById('res-total').textContent = '$ 0 + IVA';
        document.getElementById('res-detalle').textContent = 'Por favor, seleccioná al menos una ubicación.';
        btnWhatsapp.disabled = true;
        btnWhatsapp.textContent = 'Seleccioná una ubicación';
        return;
      } else {
        btnWhatsapp.disabled = false;
        btnWhatsapp.textContent = 'Reservar estas ubicaciones';
      }

      // LÓGICA DE PRECIOS ESCALONADOS
      var precioBase = 74; // Precio óptimo (25 días o más)
      var precioActual = precioBase;

      if (dias >= 1 && dias <= 6) {
        precioActual = precioBase * 1.15; // 15% más
      } else if (dias >= 7 && dias <= 14) {
        precioActual = precioBase * 1.10; // 10% más
      } else if (dias >= 15 && dias <= 24) {
        precioActual = precioBase * 1.05; // 5% más
      } else if (dias >= 25) {
        precioActual = precioBase; // Sin recargo
      }

      var pasesTotalesDia = totemsEquivalentes * pases;
      var total = precioActual * pasesTotalesDia * dias;
      
      var fmt = new Intl.NumberFormat('es-AR', {
        style: 'currency',
        currency: 'ARS',
        currencyDisplay: 'narrowSymbol',
        maximumFractionDigits: 2
      });
      
      document.getElementById('res-total').textContent = fmt.format(total) + ' + IVA';
      
      var txtPuntos = locacionesCount === 1 ? '1 punto de exhibición' : locacionesCount + ' puntos de exhibición';
      var txtDias = dias === 1 ? '1 día' : dias + ' días';
      
      document.getElementById('res-detalle').textContent = 'Incluye: ' + txtPuntos + ' en simultáneo. Totalizando ' + pasesTotalesDia + ' pases de 15 seg. por día durante ' + txtDias + '.';
    }

    function enviarWhatsApp() {
      var pases = get('pases');
      var dias = get('dias');
      var elTotal = document.getElementById('res-total');
      var totalText = elTotal ? elTotal.textContent : '$ 0';
      
      var checkboxes = document.querySelectorAll('.ubi-chip input:checked');
      var nombresUbicaciones = [];
      checkboxes.forEach(function(cb) {
        nombresUbicaciones.push("- " + cb.getAttribute('data-name'));
      });
      
      var listaTexto = nombresUbicaciones.join('\n');
      
      var mensaje = 'Hola! Estuve usando el simulador web y quiero consultar disponibilidad para una campaña de ' + pases + ' pases diarios (base tótem) por ' + dias + ' días.\n\n*Ubicaciones seleccionadas:*\n' + listaTexto + '\n\n*(Presupuesto estimado: ' + totalText + ')*';
      
      var telefono = "5493876022170";
      window.open('https://wa.me/' + telefono + '?text=' + encodeURIComponent(mensaje), '_blank');
    }

    window.onload = function() {
      calcular();
    };
  </script>

</body>
</html>
