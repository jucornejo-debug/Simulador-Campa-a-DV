<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador de Campaña | Dominio Visual</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f4f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.07);
    }

    .header { margin-bottom: 2rem; }

    .header p {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 4px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .campo { margin-bottom: 1.4rem; }

    .campo label {
      display: block;
      font-size: 13px;
      color: #777;
      margin-bottom: 8px;
    }

    .campo-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-step {
      width: 44px;
      height: 48px;
      border: none;
      background: #f5f4f0;
      border-radius: 12px;
      font-size: 22px;
      color: #444;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
      line-height: 1;
    }

    .btn-step:hover { background: #e8e7e3; }
    .btn-step:active { transform: scale(0.94); }

    .num-input {
      flex: 1;
      height: 48px;
      font-size: 22px;
      font-weight: 600;
      color: #1a1a1a;
      text-align: center;
      border: 1.5px solid #efefef;
      border-radius: 12px;
      background: #fff;
      padding: 0 8px;
      min-width: 0;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }

    .num-input::-webkit-outer-spin-button,
    .num-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .num-input:focus { outline: none; border-color: #bbb; }

    .divider {
      border: none;
      border-top: 1px solid #efefef;
      margin: 1.8rem 0;
    }

    .total-card {
      background: #1a1a1a;
      border-radius: 14px;
      padding: 1.8rem 1.5rem;
    }

    .total-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 8px;
    }

    .total-valor {
      font-size: 40px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 12px;
    }

    .total-detalle {
      font-size: 12px;
      color: #888;
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }

    .btn-cta {
      display: block;
      width: 100%;
      background: #fff;
      color: #1a1a1a;
      border: none;
      border-radius: 10px;
      padding: 12px;
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn-cta:hover { background: #eee; }
    .btn-cta:active { transform: scale(0.98); }

    @media (max-width: 440px) {
      .card { padding: 2rem 1.25rem; }
      .total-valor { font-size: 34px; }
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="header">
      <p>Simulador Web</p>
      <h1>Presupuestá tu pauta</h1>
    </div>

    <div class="campo">
      <label>Cantidad de pantallas (Disponibles: 14)</label>
      <div class="campo-row">
        <button class="btn-step" type="button" onclick="cambiar('pantallas', -1)">-</button>
        <input class="num-input" type="number" id="val-pantallas" value="7" min="1" max="14" oninput="calcular()" onblur="validar('pantallas')">
        <button class="btn-step" type="button" onclick="cambiar('pantallas', 1)">+</button>
      </div>
    </div>

    <div class="campo">
      <label>Pases por día por pantalla</label>
      <div class="campo-row">
        <button class="btn-step" type="button" onclick="cambiar('pases', -50)">-</button>
        <input class="num-input" type="number" id="val-pases" value="200" min="50" step="50" oninput="calcular()" onblur="validar('pases')">
        <button class="btn-step" type="button" onclick="cambiar('pases', 50)">+</button>
      </div>
    </div>

    <div class="campo">
      <label>Días de pauta contratados</label>
      <div class="campo-row">
        <button class="btn-step" type="button" onclick="cambiar('dias', -1)">-</button>
        <input class="num-input" type="number" id="val-dias" value="1" min="1" oninput="calcular()" onblur="validar('dias')">
        <button class="btn-step" type="button" onclick="cambiar('dias', 1)">+</button>
      </div>
    </div>

    <hr class="divider">

    <div class="total-card">
      <div class="total-label">Inversión estimada</div>
      <div class="total-valor" id="res-total">$ 0</div>
      <div class="total-detalle" id="res-detalle">Cargando estimación...</div>
      <button class="btn-cta" type="button" onclick="enviarWhatsApp()">Reservar estas pantallas</button>
    </div>
  </div>

  <script>
    var PRECIO_BASE = 37;

    function get(campo) {
      var input = document.getElementById('val-' + campo);
      if(!input) return 1;
      var v = parseInt(input.value, 10);
      var min = parseInt(input.getAttribute('min'), 10) || 1;
      return (isNaN(v) || v < min) ? min : v;
    }

    function cambiar(campo, delta) {
      var input = document.getElementById('val-' + campo);
      if(!input) return;
      var max = parseInt(input.getAttribute('max'), 10);
      var nuevoValor = get(campo) + delta;
      if (max && nuevoValor > max) nuevoValor = max;
      var min = parseInt(input.getAttribute('min'), 10) || 1;
      if (nuevoValor < min) nuevoValor = min;
      input.value = nuevoValor;
      calcular();
    }

    function validar(campo) {
      var input = document.getElementById('val-' + campo);
      if(!input) return;
      var min = parseInt(input.getAttribute('min'), 10) || 1;
      var max = parseInt(input.getAttribute('max'), 10);
      var v = parseInt(input.value, 10);
      if (isNaN(v) || v < min) v = min;
      if (max && v > max) v = max;
      input.value = v;
      calcular();
    }

    function calcular() {
      var pantallas = get('pantallas');
      var pases = get('pases');
      var dias = get('dias');
      var total = PRECIO_BASE * pantallas * pases * dias;
      
      var fmt = new Intl.NumberFormat('es-AR', {
        style: 'currency',
        currency: 'ARS',
        currencyDisplay: 'narrowSymbol',
        maximumFractionDigits: 2
      });
      
      var elTotal = document.getElementById('res-total');
      var elDetalle = document.getElementById('res-detalle');
      
      if(elTotal) elTotal.textContent = fmt.format(total);
      
      var txtPantallas = pantallas === 1 ? '1 pantalla' : pantallas + ' pantallas';
      var txtPases = pases === 1 ? '1 pase diario' : pases + ' pases diarios';
      var txtDias = dias === 1 ? '1 día de cobertura' : dias + ' días de cobertura';
      
      if(elDetalle) elDetalle.textContent = 'Incluye: ' + txtPantallas + ' en simultáneo, ' + txtPases + ' por pantalla durante ' + txtDias + '.';
    }

    function enviarWhatsApp() {
      var pantallas = get('pantallas');
      var pases = get('pases');
      var dias = get('dias');
      var elTotal = document.getElementById('res-total');
      var totalText = elTotal ? elTotal.textContent : '$ 0';
      
      var mensaje = 'Hola! Estuve usando el simulador web y quiero consultar disponibilidad para una campaña de ' + pantallas + ' pantallas, ' + pases + ' pases diarios por ' + dias + ' días (Presupuesto estimado: ' + totalText + ').';
      var telefono = "5493876022170"; // Acuérdate de cambiarlo por tu celu real sin el 0 ni el 15.
      
      window.open('https://wa.me/' + telefono + '?text=' + encodeURIComponent(mensaje), '_blank');
    }

    // Espera a que cargue toda la web antes de calcular
    window.onload = function() {
      calcular();
    };
  </script>

</body>
</html>
