<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador de Campaña | Dominio Visual</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f4f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: #fff;
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 2px 24px rgba(0,0,0,0.07);
    }

    .header { margin-bottom: 2rem; }

    .header p {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 4px;
    }

    .header h1 {
      font-size: 22px;
      font-weight: 600;
      color: #1a1a1a;
    }

    .campo { margin-bottom: 1.4rem; }

    .campo label {
      display: block;
      font-size: 13px;
      color: #777;
      margin-bottom: 8px;
    }

    .campo-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .btn-step {
      width: 44px;
      height: 48px;
      border: none;
      background: #f5f4f0;
      border-radius: 12px;
      font-size: 22px;
      color: #444;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, transform 0.1s;
      line-height: 1;
    }

    .btn-step:hover { background: #e8e7e3; }
    .btn-step:active { transform: scale(0.94); }

    .num-input {
      flex: 1;
      height: 48px;
      font-size: 22px;
      font-weight: 600;
      color: #1a1a1a;
      text-align: center;
      border: 1.5px solid #efefef;
      border-radius: 12px;
      background: #fff;
      padding: 0 8px;
      min-width: 0;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }

    .num-input::-webkit-outer-spin-button,
    .num-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    .num-input:focus { outline: none; border-color: #bbb; }

    .divider {
      border: none;
      border-top: 1px solid #efefef;
      margin: 1.8rem 0;
    }

    .total-card {
      background: #1a1a1a;
      border-radius: 14px;
      padding: 1.8rem 1.5rem; /* Más aire vertical */
    }

    .total-label {
      font-size: 10px; /* Un punto más chica */
      font-weight: 600;
      letter-spacing: 0.15em; /* Más espaciado corporativo */
      text-transform: uppercase;
      color: #888;
      margin-bottom: 8px;
    }

    .total-valor {
      font-size: 40px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -1px;
      line-height: 1;
      margin-bottom: 12px;
    }

    .total-detalle {
      font-size: 12px;
      color: #888; /* Un toque más claro para lectura con poco brillo */
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }

      width: 100%;
